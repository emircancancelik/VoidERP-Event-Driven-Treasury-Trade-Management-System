version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: voiderp_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  control_pod:
    build: .
    container_name: voiderp_control
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PYTHONUNBUFFERED=1
    tty: true
    command: python pod/control_pod/main.py
    depends_on:
      rabbitmq:
        condition: service_healthy

  intelligence_pod:
    build: .
    container_name: voiderp_intelligence
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PYTHONUNBUFFERED=1
    tty: true
    command: python pod/intelligence_pod/main.py
    depends_on:
      rabbitmq:
        condition: service_healthy

  data_pod:
    build: .
    container_name: voiderp_data
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PYTHONUNBUFFERED=1
    tty: true
    command: python pod/data_pod/ingestion.py
    depends_on:
      rabbitmq:
        condition: service_healthy
